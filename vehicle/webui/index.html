<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>link_controller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--bg2:#0f1019;--panel:#141520;--panel2:#191a2a;
  --border:#1e2035;--border-hi:#2a2d4a;
  --text:#c8cad0;--mute:#6b6e7a;--text-bright:#eef0f4;
  --accent:#e94560;--accent-glow:rgba(233,69,96,.15);
  --ok:#22c55e;--ok-bg:rgba(34,197,94,.1);
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,.1);
  --bad:#ef4444;--bad-bg:rgba(239,68,68,.1);
  --fec:#3b82f6;--mcs:#bc8cff;--common:#6b6e7a;
}
html{font-size:13px}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden}
code,pre,.mono,.tune-row .name,.timeline,.kv dd,.card .v{font-family:'JetBrains Mono',monospace}

/* Sticky telemetry bar header */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1rem;padding:0 1.2rem;height:44px;background:var(--bg2);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
header h1{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1rem;color:var(--text-bright);letter-spacing:-.02em;white-space:nowrap;margin:0}
header h1 .v{color:var(--mute);font-weight:400;margin-left:.6rem;font-family:'DM Sans',sans-serif;font-size:.78rem}
header .conn{font-size:.78rem;padding:3px 10px;border-radius:4px;background:var(--panel);border:1px solid var(--border);font-family:'JetBrains Mono',monospace}
header .conn.ok{color:var(--ok);border-color:var(--ok);background:var(--ok-bg)}
header .conn.bad{color:var(--bad);border-color:var(--bad);background:var(--bad-bg)}
/* Auto-state chip — "fec auto · mcs auto" badge in the header so the
 * operator can tell at a glance whether the adaptive loops are running
 * without opening the Tune tab. Colour reflects worst-of-pair:
 *   .ok  — both on  (the normal case)
 *   .warn — exactly one on (split state, usually after a manual pin)
 *   .bad — both off (everything is being driven by hand) */
header .chip{margin-left:auto;font-size:.72rem;padding:2px 8px;border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;cursor:help;color:var(--mute);white-space:nowrap}
header .chip.ok{color:var(--ok);border-color:var(--ok);background:var(--ok-bg)}
header .chip.warn{color:var(--warn);border-color:var(--warn);background:var(--warn-bg)}
header .chip.bad{color:var(--bad);border-color:var(--bad);background:var(--bad-bg)}

/* Tabs */
nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.2rem;gap:0}
nav button{flex:0 0 auto;background:none;color:var(--mute);border:none;border-bottom:2px solid transparent;padding:.7rem 1.2rem;font:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
nav button:hover{color:var(--text)}
nav button.active{color:var(--accent);border-bottom-color:var(--accent)}

main{padding:1.2rem;overflow:auto;height:calc(100vh - 86px);max-width:1100px;margin:0 auto}
.tab{display:none}
.tab.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Card grid (Live tab) */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.8rem;margin-bottom:.8rem}
.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:.8rem 1rem;transition:border-color .15s}
.card:hover{border-color:var(--border-hi)}
.card h3{margin:0 0 .4rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);font-weight:600}
.card .v{font-size:1.3rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text-bright)}
.card .v.ok{color:var(--ok)}
.card .v.warn{color:var(--warn)}
.card .v.bad{color:var(--bad)}
.card .v.muted{color:var(--mute)}
.card .sub{font-size:.72rem;color:var(--mute);margin-top:.2rem}

/* Detail panel rows */
.row{display:flex;gap:.8rem;margin-bottom:.8rem;flex-wrap:wrap}
.row > *{flex:1;min-width:240px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.panel h2{margin:0;padding:.55rem 1rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);font-weight:600;background:var(--bg2);border-bottom:1px solid var(--border)}
.panel .kv,.panel .ant-row{padding:.7rem 1rem}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 1rem;font-size:.78rem}
.kv dt{color:var(--mute);font-family:'JetBrains Mono',monospace}
.kv dd{margin:0;font-variant-numeric:tabular-nums;color:var(--text)}

/* Antenna chips */
.ant-row{display:flex;flex-wrap:wrap;gap:.5rem}
.ant-row .ant{display:flex;flex-direction:column;align-items:center;background:var(--bg);padding:.4rem .8rem;border-radius:4px;min-width:74px;border:1px solid var(--border)}
.ant-row .ant .name{font-size:.65rem;color:var(--mute);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.15rem;font-family:'JetBrains Mono',monospace}
.ant-row .ant .val{font-size:1.05rem;font-weight:600;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace}
.ant-row .ant .val.ok{color:var(--ok)}
.ant-row .ant .val.warn{color:var(--warn)}
.ant-row .ant .val.bad{color:var(--bad)}
.ant-row .ant.muted .val{color:var(--mute)}

/* Payload flags */
.payload-flags{display:inline-flex;gap:.25rem;margin-left:.4rem}
.payload-flags .flag{font-size:.6rem;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;font-family:'JetBrains Mono',monospace}
.payload-flags .flag.warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn)}
.payload-flags .flag.info{background:rgba(59,130,246,.15);color:var(--fec);border:1px solid var(--fec)}

/* Toggle strips — pinned at the top of the Tune tab so the loop-enable
 * keys (fec.enabled / mcs.enabled / cmd.enabled) aren't lost among ~75
 * params. Mirrors the .adaptive-strip pattern from the ground PR #52
 * Link tab. Click a button → /set?<key>=<0|1>; the active state is
 * read back from the response and reflected in .on/.off styling.
 *
 * Split into two side-by-side strips because the semantics differ:
 *   .adaptive-strip — fec/mcs adaptive loops that overwrite manual
 *                     tune-row edits on each tick when ON.
 *   .remote-strip   — cmd.enabled gates whether the vehicle accepts
 *                     WCMDs from the ground; nothing gets overwritten. */
.strip-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.strip-row > *{flex:1 1 320px;min-width:240px}
.toggle-strip{display:flex;gap:.6rem;flex-wrap:wrap;padding:.6rem .8rem;background:var(--bg2);border:1px solid var(--border);border-radius:6px;align-items:center}
.toggle-strip .label{font-size:.78rem;color:var(--text-bright);font-family:'JetBrains Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.toggle-strip .group{display:flex;align-items:center;gap:.3rem}
.toggle-strip .group .name{font-size:.72rem;color:var(--mute);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em}
.toggle-strip button{background:var(--panel);color:var(--mute);border:1px solid var(--border);border-radius:3px;padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.toggle-strip button:hover{border-color:var(--border-hi);color:var(--text)}
.toggle-strip button.on{background:var(--ok-bg);color:var(--ok);border-color:var(--ok)}
.toggle-strip button.off{background:var(--bad-bg);color:var(--bad);border-color:var(--bad)}
.toggle-strip button.flash-bad{animation:flash-bad 1.2s ease-out}
.toggle-strip .hint{font-size:.7rem;color:var(--mute);flex:1 1 100%;margin-top:.2rem}

/* Tune tab — sections + parameter rows */
.tune-expert{display:flex;align-items:center;gap:.45rem;margin:.2rem 0 1rem;font-size:.76rem;color:var(--mute);cursor:pointer;user-select:none}
.tune-expert input{accent-color:var(--warn)}
.tune-section{margin-bottom:1.2rem}
.tune-section h2{margin:0 0 .5rem;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600;border-left:3px solid var(--common);padding-left:.6rem;color:var(--mute)}
.tune-section.fec h2{border-left-color:var(--fec);color:var(--fec)}
.tune-section.mcs h2{border-left-color:var(--mcs);color:var(--mcs)}
.tune-section.common h2{border-left-color:var(--common);color:var(--mute)}
.tune-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.4rem}
.tune-row{display:grid;grid-template-columns:170px 1fr 64px;gap:.4rem;align-items:center;padding:.4rem .6rem;background:var(--panel);border:1px solid var(--border);border-radius:4px;border-left:3px solid transparent;transition:all .15s}
.tune-row:hover{border-color:var(--border-hi)}
.tune-row .name{font-size:.78rem;color:var(--text);display:flex;align-items:center;gap:.4rem;min-width:0}
.tune-row .name .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* "?" hover-tip — replaces the inline two-line description that used
 * to wrap behind the input on narrow grids. Range is still inline so
 * operators don't have to hover to see [lo..hi]. */
.tune-row .name .tip{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border:1px solid var(--border-hi);border-radius:50%;color:var(--mute);font-size:.62rem;font-family:'JetBrains Mono',monospace;cursor:help;user-select:none}
.tune-row .name .tip:hover{color:var(--text-bright);border-color:var(--accent)}
.tune-row .name .range{flex:0 0 auto;color:var(--mute);font-size:.7rem;font-family:'JetBrains Mono',monospace}
.tune-row input{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px;padding:4px 6px;font-family:'JetBrains Mono',monospace;font-size:.78rem;width:100%;transition:border-color .15s}
.tune-row input:focus{outline:none;border-color:var(--accent)}
.tune-row input[type="number"]{-moz-appearance:textfield}
.tune-row input[type="number"]::-webkit-outer-spin-button,.tune-row input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
/* Apply buttons: solid orange (matches the "modify state" affordance
 * used for primary action buttons elsewhere in the UI). */
.tune-row button{background:var(--warn);color:#000;border:1px solid var(--warn);border-radius:3px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.tune-row button:hover{background:#d97706;border-color:#d97706;transform:translateY(-1px)}
.tune-row.applied{border-left-color:var(--ok);animation:flash-ok 1s ease-out}
.tune-row.error{border-left-color:var(--bad);animation:flash-bad 1.5s ease-out}
@keyframes flash-ok{0%{background:rgba(34,197,94,.18)}100%{background:var(--panel)}}
@keyframes flash-bad{0%{background:rgba(239,68,68,.18)}100%{background:var(--panel)}}

/* Timeline */
.timeline{font-size:.75rem}
.timeline .filters{display:flex;gap:.4rem;margin-bottom:.6rem;align-items:center}
.timeline .filters label{display:flex;align-items:center;gap:.3rem;cursor:pointer;padding:4px 10px;background:var(--panel);border:1px solid var(--border);border-radius:4px;font-family:'DM Sans',sans-serif;font-size:.78rem;transition:all .15s}
.timeline .filters label:hover{border-color:var(--border-hi);color:var(--text-bright)}
.timeline .filters label input{margin:0}
.timeline .filters .clear{margin-left:auto;background:var(--panel);color:var(--mute);border:1px solid var(--border);border-radius:4px;padding:4px 12px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.timeline .filters .clear:hover{border-color:var(--accent);color:var(--accent)}
.timeline .events{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:.4rem;height:calc(100vh - 220px);overflow-y:auto}
.timeline .ev{padding:3px 6px;border-bottom:1px solid var(--border);display:flex;gap:.6rem;align-items:flex-start;white-space:pre-wrap;word-break:break-all}
.timeline .ev:last-child{border:0}
.timeline .ev .t{color:var(--mute);flex:0 0 auto;font-variant-numeric:tabular-nums}
.timeline .ev .s{flex:0 0 auto;font-weight:600;width:42px;text-transform:uppercase;letter-spacing:.04em;font-size:.7rem}
.timeline .ev.fec .s{color:var(--fec)}
.timeline .ev.mcs .s{color:var(--mcs)}
.timeline .ev.common .s{color:var(--mute)}
.timeline .ev .m{flex:1;color:var(--text)}

.muted{color:var(--mute)}
.empty{color:var(--mute);text-align:center;padding:1.2rem;font-size:.85rem;border:1px dashed var(--border);border-radius:6px}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--mute)}
</style>
</head>
<body>
<header>
  <h1>link_controller<span class="v">FEC + MCS adaptive controller</span></h1>
  <span id="auto-chip" class="chip" title="Adaptive loop state. Click the buttons on the Tune tab to toggle.">auto —</span>
  <span id="conn" class="conn">connecting…</span>
</header>
<nav>
  <button data-tab="live" class="active">Live</button>
  <button data-tab="tune">Tune</button>
  <button data-tab="timeline">Timeline</button>
</nav>
<main>
  <section id="tab-live" class="tab active">
    <div class="cards">
      <div class="card"><h3>Uptime</h3><div class="v" id="c-uptime">—</div></div>
      <div class="card"><h3>FEC k / n</h3><div class="v" id="c-fec">—</div><div class="sub" id="c-fec-sub">—</div></div>
      <div class="card"><h3>MCS · V+2 probe</h3><div class="v" id="c-mcs">—</div><div class="sub" id="c-mcs-sub">—</div></div>
      <div class="card"><h3>RSSI</h3><div class="v" id="c-rssi">—</div><div class="sub" id="c-rssi-sub">—</div></div>
      <div class="card"><h3>Loss</h3><div class="v" id="c-loss">—</div><div class="sub" id="c-loss-sub">—</div></div>
      <div class="card"><h3>Diversity</h3><div class="v" id="c-div">—</div><div class="sub" id="c-div-sub">—</div></div>
      <div class="card"><h3>Headroom</h3><div class="v" id="c-headroom">—</div><div class="sub" id="c-headroom-sub">—</div></div>
      <div class="card"><h3>Payload</h3><div class="v" id="c-payload">—</div><div class="sub" id="c-payload-sub">—</div></div>
    </div>
    <div class="row">
      <div class="panel">
        <h2>Selector</h2>
        <dl class="kv" id="kv-sel"></dl>
      </div>
      <div class="panel">
        <h2>Controller</h2>
        <dl class="kv" id="kv-ctrl"></dl>
      </div>
      <div class="panel">
        <h2>Radio</h2>
        <dl class="kv" id="kv-radio"></dl>
      </div>
    </div>
    <div class="panel">
      <h2>RSSI per antenna · dBm (current)</h2>
      <div class="ant-row" id="ant-row"><div class="empty">no rx_ant data yet</div></div>
    </div>
  </section>

  <section id="tab-tune" class="tab"></section>

  <section id="tab-timeline" class="tab">
    <div class="timeline">
      <div class="filters">
        <label><input type="checkbox" data-subsys="fec" checked> fec</label>
        <label><input type="checkbox" data-subsys="mcs" checked> mcs</label>
        <label><input type="checkbox" data-subsys="common" checked> common</label>
        <button class="clear" id="ev-clear">clear</button>
      </div>
      <div class="events" id="events"><div class="empty">waiting for events…</div></div>
    </div>
  </section>
</main>

<script>
"use strict";

// ── State ────────────────────────────────────────────────────────────
const state = {
  paramsSchema: null,    // [{name, type, lo, hi, help, value, subsys}, ...]
  tuneRendered: false,
  tuneExpert: false,     // false = /schema (public keys), true = /schema?all=1
  evBuf: [],             // [{t, subsys, msg}, ...] — capped
  evCap: 200,
  filters: {fec:true, mcs:true, common:true},
};

const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

// ── Tabs ─────────────────────────────────────────────────────────────
$$("nav button").forEach(b => b.addEventListener("click", () => {
  $$("nav button").forEach(x => x.classList.remove("active"));
  $$(".tab").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  $("#tab-" + b.dataset.tab).classList.add("active");
  if (b.dataset.tab === "tune" && !state.tuneRendered) renderTune();
}));

// ── Subsystem detection from dotted key ──────────────────────────────
function subsysOf(key) {
  if (key.startsWith("fec.")) return "fec";
  if (key.startsWith("mcs.")) return "mcs";
  return "common";
}

// ── Connection status / SSE ──────────────────────────────────────────
function setConn(ok, text) {
  const el = $("#conn");
  el.className = "conn " + (ok ? "ok" : "bad");
  el.textContent = text;
}

function startSSE() {
  let es;
  try { es = new EventSource("/events"); } catch (e) { setConn(false, "sse failed"); return; }
  es.onopen = () => setConn(true, "live");
  es.onerror = () => setConn(false, "disconnected");
  es.onmessage = e => {
    let d;
    try { d = JSON.parse(e.data); } catch (_) { return; }
    pushEvent(d.t_s, d.subsys || "common", d.msg || "");
  };
}

function pushEvent(t, subsys, msg) {
  state.evBuf.push({t, subsys, msg});
  if (state.evBuf.length > state.evCap) state.evBuf.shift();
  appendEventToDom(t, subsys, msg);
}

function appendEventToDom(t, subsys, msg) {
  if (!state.filters[subsys]) return;
  const evDiv = $("#events");
  if (evDiv.firstElementChild && evDiv.firstElementChild.classList.contains("empty"))
    evDiv.innerHTML = "";
  const row = document.createElement("div");
  row.className = "ev " + subsys;
  const t1 = document.createElement("span"); t1.className = "t"; t1.textContent = (typeof t === "number" ? t.toFixed(3) : "—") + "s";
  const t2 = document.createElement("span"); t2.className = "s"; t2.textContent = subsys;
  const t3 = document.createElement("span"); t3.className = "m"; t3.textContent = msg;
  row.append(t1, t2, t3);
  evDiv.appendChild(row);
  // cap rendered children too
  while (evDiv.children.length > state.evCap) evDiv.removeChild(evDiv.firstChild);
  // auto-scroll if user is near bottom
  if (evDiv.scrollTop + evDiv.clientHeight + 40 >= evDiv.scrollHeight)
    evDiv.scrollTop = evDiv.scrollHeight;
}

function rerenderEvents() {
  const evDiv = $("#events");
  evDiv.innerHTML = "";
  for (const e of state.evBuf) appendEventToDom(e.t, e.subsys, e.msg);
  if (!evDiv.children.length) evDiv.innerHTML = '<div class="empty">no events match filters</div>';
}

$$(".timeline .filters input").forEach(cb => cb.addEventListener("change", () => {
  state.filters[cb.dataset.subsys] = cb.checked;
  rerenderEvents();
}));
$("#ev-clear").addEventListener("click", () => { state.evBuf = []; rerenderEvents(); });

// ── Live tab — periodic /status fetch ────────────────────────────────
async function pollStatus() {
  try {
    const r = await fetch("/status", {cache:"no-store"});
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    renderStatus(j);
  } catch (_) { /* SSE conn indicator already shows it */ }
}

function fmtKv(parent, obj, fmt) {
  parent.innerHTML = "";
  for (const k of Object.keys(obj)) {
    const dt = document.createElement("dt"); dt.textContent = k;
    const dd = document.createElement("dd");
    let v = obj[k];
    if (fmt && fmt[k]) v = fmt[k](v);
    else if (typeof v === "number") v = (Number.isInteger(v) ? v : v.toFixed(2));
    else if (typeof v === "boolean") v = v ? "yes" : "no";
    dd.textContent = (v === null || v === undefined) ? "—" : String(v);
    parent.appendChild(dt); parent.appendChild(dd);
  }
}

// Header auto-state chip — reads fec.enabled / mcs.enabled out of the
// status poll. cmd.enabled is not surfaced in /status (would need a
// server-side change), so the chip stays scoped to the two adaptive
// loops; the Tune-tab strip still covers cmd.
function renderAutoChip(s) {
  const chip = $("#auto-chip");
  if (!chip) return;
  const fec = !!(s && s.fec && s.fec.enabled);
  const mcs = !!(s && s.mcs && s.mcs.enabled);
  chip.classList.remove("ok","warn","bad");
  if (fec && mcs)      chip.classList.add("ok");
  else if (fec || mcs) chip.classList.add("warn");
  else                 chip.classList.add("bad");
  chip.textContent =
    "fec " + (fec ? "auto" : "OFF") +
    " · mcs " + (mcs ? "auto" : "OFF");
  chip.title =
    "fec.enabled = " + (fec ? "true" : "false") + "\n" +
    "mcs.enabled = " + (mcs ? "true" : "false") + "\n" +
    "Toggle these on the Tune tab.";
}

function renderStatus(s) {
  $("#c-uptime").textContent = (s.uptime_s ?? 0).toFixed(1) + "s";
  renderAutoChip(s);
  // Keep the Tune-tab strip in sync with external changes (CLI, another
  // browser session). Only the two adaptive keys ride along on /status;
  // cmd.enabled isn't exposed there, so it stays driven by /set + the
  // one-shot /params read in buildToggleStrips.
  refreshAdaptiveStripFromParams({
    "fec.enabled": !!(s && s.fec && s.fec.enabled),
    "mcs.enabled": !!(s && s.mcs && s.mcs.enabled),
  });

  // FEC card — show k/n with explicit encoded bitrate + parity %.
  // Bitrate is computed here (avg_frame_size × fps × 8) instead of in
  // a separate card; the operator gets the number directly without
  // mental math, and the "Headroom" card below shows the actionable
  // budget-vs-encoded comparison.
  const fec = s.fec || {};
  if (fec.have_current) {
    $("#c-fec").textContent = fec.k + " / " + fec.n;
    $("#c-fec").className = "v ok";
    const encoded_kbps = (fec.avg_frame_size||0) * (fec.fps||0) * 8 / 1000;
    const parity_pct = fec.n > 0 ? ((fec.n - fec.k) / fec.n * 100) : 0;
    const bps = encoded_kbps > 0
      ? (encoded_kbps/1000).toFixed(2) + " Mbps · "
      : "";
    $("#c-fec-sub").textContent = bps + parity_pct.toFixed(0) + "% parity · " + (fec.fps||0).toFixed(0) + " fps";
  } else {
    $("#c-fec").textContent = "—";
    $("#c-fec").className = "v";
    $("#c-fec-sub").textContent = "(waiting for first commit)";
  }

  // MCS · V+2 probe card — current committed MCS plus the probe rung the
  // law gates on (per-mille PER + freshness).
  const mcs = s.mcs || {};
  const pb = mcs.probe || {};
  if (mcs.current_mcs >= 0) {
    const probeStr = (pb.tuned_mcs >= 0) ? " → P" + pb.tuned_mcs : "";
    $("#c-mcs").textContent = "MCS " + mcs.current_mcs + probeStr;
    $("#c-mcs").className = mcs.in_failsafe ? "v bad" : "v ok";
    if (mcs.in_failsafe) {
      $("#c-mcs-sub").textContent = "FAILSAFE (no rx_ant)";
    } else {
      const perStr = (pb.v2_per_milli >= 0)
        ? "V+2 " + pb.v2_per_milli + "‰ · " + (pb.v2_age_s >= 0 ? pb.v2_age_s.toFixed(1) + "s" : "—")
        : "V+2 no data";
      $("#c-mcs-sub").textContent = perStr + " · commits " + mcs.commit_count;
    }
  } else {
    $("#c-mcs").textContent = "—";
    $("#c-mcs").className = "v";
    $("#c-mcs-sub").textContent = "(no rx_ant yet)";
  }

  // RSSI — smoothed dBm + slope; guard badge when a floor/fade rule is
  // suppressing promotes (or actively demoting).
  const score = s.score || {};
  const guard = mcs.rssi_guard || {};
  if ("smoothed_rssi" in score) {
    const sm = score.smoothed_rssi;
    const slope = score.rssi_slope_db_s || 0;
    const guardOn = guard.floor_active || guard.fade_active;
    $("#c-rssi").textContent = sm.toFixed(1) + " dBm";
    $("#c-rssi").className = "v " + (guardOn || sm < -75 ? "bad" : sm < -60 ? "warn" : "ok");
    let sub = "slope " + (slope >= 0 ? "+" : "") + slope.toFixed(1) + " dB/s";
    if (guard.floor_active) sub += " · FLOOR";
    if (guard.fade_active)  sub += " · FADE";
    $("#c-rssi-sub").textContent = sub;
  }

  // Loss (smoothed/EWMA — the values the law evaluates)
  if ("smoothed_lost_ratio" in score) {
    const lp = score.smoothed_lost_ratio * 100;
    $("#c-loss").textContent = lp.toFixed(2) + "%";
    $("#c-loss").className = "v " + (lp > 5 ? "bad" : lp > 0.5 ? "warn" : "ok");
    $("#c-loss-sub").textContent = "fec_recov " + ((score.smoothed_recov_ratio||0)*100).toFixed(1) + "%";
  }

  // Diversity — redundant-copies-per-unique-fragment (count_p_diversity /
  // count_p_uniq).  Two adapters fully overlapping = 100%; N adapters fully
  // overlapping = (N-1) × 100%.  Distinct from fec_recov: high diversity
  // means a second/third adapter routinely saved us without needing parity.
  // adapter_count = -1 → older RX without the patch.
  if ("smoothed_diversity_ratio" in score) {
    const dv = (score.smoothed_diversity_ratio || 0) * 100;
    const ac = ("adapter_count" in score) ? score.adapter_count : -1;
    $("#c-div").textContent = dv.toFixed(1) + "%";
    /* Colour: ok when ≥1 redundant copy on average; warn for partial
     * overlap; neutral for single-adapter setups. */
    $("#c-div").className = "v " + (dv >= 95 ? "ok" : dv > 0 ? "warn" : "");
    let sub;
    if (ac > 0) {
      sub = ac + (ac === 1 ? " adapter" : " adapters") + " active";
    } else if (dv > 0) {
      sub = "redundant coverage";
    } else {
      sub = "single adapter / no overlap";
    }
    $("#c-div-sub").textContent = sub;
  }

  // Headroom — actionable derived value: how much link budget is left
  // (or how far over budget the encoder is running). Computed from the
  // sidecar's encoded bitrate vs the FEC controller's safe-budget
  // (phy × k/n × safety, clamped to bitrate_min/max).
  //
  // Threshold calibration accounts for the fact that the budget is
  // ALREADY safety_margin (0.5 by default) below post-FEC capacity, so
  // small overshoots are within normal frame-size fluctuation:
  //   green  : usage  < 100% (under conservative budget)
  //   yellow : 100-140%      (eating safety margin, still fine)
  //   red    : >= 140%       (approaching PHY-after-FEC ceiling)
  // For reference: at 200% of budget the encoder is using 100% of the
  // post-FEC capacity (= phy × k/n) and will drop frames.
  const wfb = s.wfb || {};
  const have_budget  = typeof wfb.computed_safe_kbps === "number" && wfb.computed_safe_kbps > 0;
  const have_encoded = fec.have_current && fec.fps > 0 && fec.avg_frame_size > 0;
  if (have_budget && have_encoded) {
    const encoded_kbps = (fec.avg_frame_size * fec.fps * 8) / 1000;
    const free_kbps    = wfb.computed_safe_kbps - encoded_kbps;
    const usage        = encoded_kbps / wfb.computed_safe_kbps;
    const sign         = free_kbps >= 0 ? "+" : "";
    $("#c-headroom").textContent = sign + (free_kbps/1000).toFixed(2) + " Mbps " +
                                   (free_kbps >= 0 ? "free" : "over");
    $("#c-headroom").className =
      usage >= 1.40 ? "v bad"  :
      usage >= 1.00 ? "v warn" : "v ok";
    $("#c-headroom-sub").textContent =
      (encoded_kbps/1000).toFixed(2) + " / " + (wfb.computed_safe_kbps/1000).toFixed(2) +
      " Mbps  (" + (usage*100).toFixed(0) + "%)";
  } else if (have_budget) {
    $("#c-headroom").textContent = (wfb.computed_safe_kbps/1000).toFixed(2) + " Mbps";
    $("#c-headroom").className = "v warn";
    $("#c-headroom-sub").textContent = "budget only — no encoder data";
  } else {
    $("#c-headroom").textContent = "—";
    $("#c-headroom").className = "v muted";
    $("#c-headroom-sub").textContent = "(no radio + controller state)";
  }

  // Detail panels
  fmtKv($("#kv-sel"), {
    mcs: mcs.current_mcs,
    probe_tuned_mcs: pb.tuned_mcs,
    v2_per_milli: pb.v2_per_milli,
    v2_age_s: (pb.v2_age_s >= 0) ? pb.v2_age_s.toFixed(2) : "—",
    v2_gated: !!pb.v2_gated,
    probe_records: pb.records,
    retune_fails: pb.retune_fails,
    rssi_slope: (score.rssi_slope_db_s != null) ? score.rssi_slope_db_s.toFixed(1) : "—",
    floor_active: !!guard.floor_active,
    fade_active: !!guard.fade_active,
    flap_guard: (mcs.flap_guard && mcs.flap_guard.active)
      ? ("rung " + mcs.flap_guard.mcs) : "off",
    in_failsafe: !!mcs.in_failsafe,
    commit_count: mcs.commit_count,
    changes_in_window: mcs.changes_in_window,
  });
  fmtKv($("#kv-ctrl"), {
    have_current: !!fec.have_current,
    k: fec.k, n: fec.n,
    avg_frame_size: (fec.avg_frame_size||0).toFixed(1),
    update_count: fec.update_count,
    fps: (fec.fps||0).toFixed(2),
  });
  const radio = s.radio || {};
  fmtKv($("#kv-radio"), {
    valid: !!radio.valid,
    mcs_index: radio.mcs,
    bw: radio.bw,
    short_gi: !!radio.short_gi,
    stbc: radio.stbc,
    ldpc: !!radio.ldpc,
    vht: !!radio.vht_mode,
    nss: radio.vht_nss,
    phy_mbps: (radio.phy_mbps != null) ? radio.phy_mbps.toFixed(1) : "—",
  });

  // Payload card — adaptive outgoing.maxPayloadSize. When the feature
  // is off (fec.payload_max = 0, the shipped default) the card shows
  // "off" muted; when enabled it shows the last value written to venc
  // with two pill flags:
  //   CAPPED  — the bitrate→payload tier table wanted more headroom
  //             than payload_max allowed (expect higher pps);
  //   JUMBO   — informational, payload_max > 1472 so the operator has
  //             declared a jumbo-capable end-to-end path.
  const pld = s.payload || {};
  const cP = $("#c-payload"), cPS = $("#c-payload-sub");
  if (!pld.enabled) {
    cP.textContent = "off";
    cP.className = "v muted";
    cPS.textContent = "fixed venc payload";
  } else {
    let flags = "";
    if (pld.table_clipped) flags += '<span class="flag warn">CAPPED</span>';
    if (pld.would_fragment_on_1500_mtu) flags += '<span class="flag info">JUMBO</span>';
    const flagHtml = flags ? '<span class="payload-flags">' + flags + '</span>' : "";
    if (pld.last_written > 0) {
      cP.innerHTML = pld.last_written + " B" + flagHtml;
      cP.className = "v " + (pld.table_clipped ? "warn" : "ok");
      cPS.textContent = "max " + pld.max + " · sel " + (pld.selected || "—");
    } else if (pld.selected > 0) {
      cP.innerHTML = pld.selected + " B" + flagHtml;
      cP.className = "v warn";
      cPS.textContent = "max " + pld.max + " · pending first commit";
    } else {
      cP.innerHTML = "—" + flagHtml;
      cP.className = "v muted";
      cPS.textContent = "max " + pld.max + " · waiting for radio";
    }
  }

  // Per-antenna instant values (replaces the time-series chart).
  if (s.ants && Array.isArray(s.ants)) renderAntRow(s.ants);
}

function renderAntRow(ants) {
  const row = $("#ant-row");
  if (!ants.length) {
    row.innerHTML = '<div class="empty">no rx_ant data yet</div>';
    return;
  }
  let html = "";
  for (let i = 0; i < ants.length; i++) {
    const v = ants[i];
    const has = typeof v === "number";
    let cls = "";
    if (has) cls = v < -75 ? "bad" : v < -60 ? "warn" : "ok";
    html += '<div class="ant' + (has ? "" : " muted") + '">' +
            '<span class="name">ant ' + i + '</span>' +
            '<span class="val ' + cls + '">' + (has ? v.toFixed(1) : "—") + '</span>' +
            '</div>';
  }
  row.innerHTML = html;
}

// Loop-enable keys promoted into the toggle strips at the top of Tune.
// Split into two groups because the semantics differ — see the
// .adaptive-strip / .remote-strip CSS comment for the rationale.
// Each entry: {keys: [param names], label, hint}. The promoted keys
// are hidden from their parent section's tune-grid to avoid showing
// a stale duplicate row after a strip toggle.
const TOGGLE_STRIPS = [
  {
    cls:  "adaptive-strip",
    label:"Adaptive",
    hint: "ON = the controller writes k/n (fec) and the PER-probe MCS law on each tick; manual tune-row edits below are overwritten.",
    keys: ["fec.enabled", "mcs.enabled"],
  },
  {
    cls:  "remote-strip",
    label:"Remote",
    hint: "ON = vehicle accepts WCMD frames from the ground (bitrate, fps, force_idr, …). OFF = local control only.",
    keys: ["cmd.enabled"],
  },
];
const ADAPTIVE_KEYS = TOGGLE_STRIPS.flatMap(s => s.keys);

// ── Tune tab — init-once form ────────────────────────────────────────
async function renderTune() {
  const root = $("#tab-tune");
  root.innerHTML = '<div class="empty">loading…</div>';
  let params, schema;
  try {
    [params, schema] = await Promise.all([
      fetch("/params", {cache:"no-store"}).then(r => r.json()),
      fetch(state.tuneExpert ? "/schema?all=1" : "/schema",
            {cache:"no-store"}).then(r => r.json()),
    ]);
  } catch (e) {
    root.innerHTML = '<div class="empty">failed to load params (' + e + ')</div>';
    return;
  }
  // schema is [{name, type, lo, hi, help}, ...]
  state.paramsSchema = schema.map(s => ({...s, value: params[s.name], subsys: subsysOf(s.name)}));

  // Group by subsystem (excluding the keys promoted to the strip)
  const groups = {common:[], fec:[], mcs:[]};
  for (const f of state.paramsSchema) {
    if (ADAPTIVE_KEYS.includes(f.name)) continue;
    groups[f.subsys].push(f);
  }

  root.innerHTML = "";
  root.appendChild(buildToggleStrips(params));
  // Expert toggle — default /schema lists only operator-policy keys;
  // ?all=1 adds the algorithm mechanics. /set accepts both either way.
  const exp = document.createElement("label");
  exp.className = "tune-expert";
  const expCb = document.createElement("input");
  expCb.type = "checkbox";
  expCb.checked = state.tuneExpert;
  expCb.addEventListener("change", () => {
    state.tuneExpert = expCb.checked;
    renderTune();
  });
  exp.appendChild(expCb);
  exp.appendChild(document.createTextNode(
    " show expert keys (algorithm mechanics — defaults are device-validated)"));
  root.appendChild(exp);
  for (const g of ["common","fec","mcs"]) {
    if (!groups[g].length) continue;
    const sect = document.createElement("div"); sect.className = "tune-section " + g;
    const h = document.createElement("h2"); h.textContent = g + " (" + groups[g].length + ")";
    const grid = document.createElement("div"); grid.className = "tune-grid";
    sect.append(h, grid);
    for (const f of groups[g]) grid.appendChild(buildTuneRow(f));
    root.appendChild(sect);
  }
  state.tuneRendered = true;
}

// Toggle strips — two side-by-side groups (Adaptive / Remote) at the
// top of the Tune tab. State is read from /params on render, refreshed
// from /set responses on toggle, AND re-synced from each /status poll
// (so external changes via CLI or another browser don't leave the
// strip stale relative to the chip).
//
// NOTE: cmd.enabled is not exposed in /status, so the periodic sync
// only covers fec.enabled + mcs.enabled. cmd.enabled stays driven by
// /set responses + initial /params load.
function buildToggleStrips(params) {
  const row = document.createElement("div"); row.className = "strip-row";
  for (const spec of TOGGLE_STRIPS) {
    const strip = document.createElement("div");
    strip.className = "toggle-strip " + spec.cls;
    const label = document.createElement("span"); label.className = "label";
    label.textContent = spec.label;
    strip.appendChild(label);
    for (const key of spec.keys) {
      const grp = document.createElement("span"); grp.className = "group";
      const nameEl = document.createElement("span"); nameEl.className = "name";
      nameEl.textContent = key.replace(/\.enabled$/, "");
      const on  = document.createElement("button"); on.textContent  = "ON";
      const off = document.createElement("button"); off.textContent = "OFF";
      on.dataset.key  = key; on.dataset.val  = "1";
      off.dataset.key = key; off.dataset.val = "0";
      on.addEventListener("click",  () => toggleAdaptive(key, 1, on));
      off.addEventListener("click", () => toggleAdaptive(key, 0, off));
      syncAdaptiveButtons(on, off, !!params[key]);
      grp.append(nameEl, on, off);
      strip.appendChild(grp);
    }
    const hint = document.createElement("span"); hint.className = "hint";
    hint.textContent = spec.hint;
    strip.appendChild(hint);
    row.appendChild(strip);
  }
  return row;
}

function syncAdaptiveButtons(onBtn, offBtn, isOn) {
  onBtn.classList.toggle("on",   isOn);
  onBtn.classList.toggle("off",  false);
  offBtn.classList.toggle("on",  false);
  offBtn.classList.toggle("off", !isOn);
}

async function toggleAdaptive(key, val, srcBtn) {
  const url = "/set?" + encodeURIComponent(key) + "=" + val;
  const flashFail = () => {
    if (!srcBtn) return;
    srcBtn.classList.remove("flash-bad");
    void srcBtn.offsetWidth; // restart animation
    srcBtn.classList.add("flash-bad");
  };
  try {
    const r = await fetch(url, {cache:"no-store"});
    const j = await r.json();
    const ok = (j.applied || []).includes(key);
    // Reflect whatever the server actually committed (handles clamping
    // and the case where a future server-side guard refuses the toggle).
    const newVal = j.params && (key in j.params) ? !!j.params[key] : !!val;
    refreshAdaptiveStripFromParams(j.params || {[key]: newVal});
    // Also nudge the chip — saves waiting for the next 1 s status poll.
    if (key === "fec.enabled" || key === "mcs.enabled") {
      renderAutoChip({fec:{enabled:!!(j.params||{})["fec.enabled"]},
                      mcs:{enabled:!!(j.params||{})["mcs.enabled"]}});
    }
    if (!ok) {
      console.warn("toggleAdaptive: server did not apply", key, j);
      flashFail();
    }
  } catch (e) {
    console.warn("toggleAdaptive failed", key, e);
    flashFail();
  }
}

function refreshAdaptiveStripFromParams(params) {
  // Scope the lookup to either toggle strip — they're both children of
  // .strip-row, and buttons are tagged with data-key so we don't care
  // which strip a given key lives in.
  const row = document.querySelector(".strip-row");
  if (!row) return;
  for (const key of ADAPTIVE_KEYS) {
    if (!(key in params)) continue;
    const on  = row.querySelector('button[data-key="' + key + '"][data-val="1"]');
    const off = row.querySelector('button[data-key="' + key + '"][data-val="0"]');
    if (on && off) syncAdaptiveButtons(on, off, !!params[key]);
  }
}

function buildTuneRow(f) {
  const row = document.createElement("div"); row.className = "tune-row";
  row.dataset.name = f.name;
  const name = document.createElement("div"); name.className = "name";
  // Just the parameter name + a small "?" hover-tip that carries the
  // long-form description in `title` so it never wraps behind the input.
  // [lo..hi] still shown inline so operators see the valid range without
  // having to hover.
  const showRange = !(f.lo === f.hi || f.type === "bool");
  const tipText   = (f.help || f.name) + (showRange ? "  ["+f.lo+".."+f.hi+"]" : "");
  const labelEl   = document.createElement("span"); labelEl.className = "label"; labelEl.textContent = f.name;
  const tipEl     = document.createElement("span"); tipEl.className   = "tip";   tipEl.textContent   = "?"; tipEl.title = tipText;
  name.append(labelEl, tipEl);
  if (showRange) {
    const rangeEl = document.createElement("span"); rangeEl.className = "range";
    rangeEl.textContent = "["+f.lo+".."+f.hi+"]";
    name.appendChild(rangeEl);
  }
  const inp = document.createElement("input");
  inp.type = (f.type === "bool") ? "text" : "number";
  if (f.type !== "bool" && f.lo !== f.hi) {
    inp.min = f.lo;
    inp.max = f.hi;
    if (f.type === "float") inp.step = "any";
  }
  inp.value = (typeof f.value === "boolean") ? (f.value ? "1" : "0") : String(f.value);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") apply(); });
  const btn = document.createElement("button"); btn.textContent = "APPLY";
  btn.addEventListener("click", apply);
  row.append(name, inp, btn);
  async function apply() {
    const url = "/set?" + encodeURIComponent(f.name) + "=" + encodeURIComponent(inp.value);
    try {
      const r = await fetch(url, {cache:"no-store"});
      const j = await r.json();
      const ok = (j.applied || []).includes(f.name);
      row.classList.remove("applied", "error");
      void row.offsetWidth; // restart animation
      row.classList.add(ok ? "applied" : "error");
      // re-read from server response so coercion / clamping is visible
      if (ok && j.params && (f.name in j.params)) {
        const v = j.params[f.name];
        f.value = v;
        inp.value = (typeof v === "boolean") ? (v ? "1":"0") : String(v);
      }
    } catch (e) {
      row.classList.add("error");
    }
  }
  return row;
}

// ── Bootstrap ────────────────────────────────────────────────────────
startSSE();
pollStatus();
setInterval(pollStatus, 1000);
</script>
</body>
</html>
