[pytest]
# Default test target = wire-format conformance.  These run quickly and
# guard the WCMD / rx_ant / rtp_sidecar wire formats both daemons
# depend on.  See tests/protocols/README.md.
#
# To run the legacy controller-logic suite (superseded by the C
# implementation in vehicle/link_controller.c), point pytest at the
# archive:
#
#   PYTHONPATH=archive/python python -m pytest archive/python/tests
testpaths = tests
markers =
    realtime: wall-clock paced benchmarks (slow, run with -m realtime)
addopts = -m "not realtime"
